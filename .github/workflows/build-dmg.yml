name: Build DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build DMG
        run: scripts/build-dmg.sh release

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Buttons.dmg
          path: dist/Buttons-*.dmg
          if-no-files-found: error
